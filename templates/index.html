<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --sidebar-bg:  #161b22;
      --surface:     #1c2128;
      --surface-2:   #22272e;
      --input-bg:    #1c2128;
      --border:      #30363d;
      --accent:      #388bfd;
      --accent-dim:  #1f4b8e;
      --user-bubble: #1f4b8e;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --text-dim:    #4d5566;
      --danger:      #f85149;
      --warn:        #e3b341;
      --success:     #3fb950;
      --radius:      10px;
      --radius-sm:   6px;
      --sidebar-w:   260px;
      --header-h:    52px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      padding: 2px 4px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    .btn-new-chat {
      width: 100%;
      padding: 8px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      text-align: left;
    }
    .btn-new-chat:hover { background: #1f6feb; }

    /* Sessions list */
    .sessions-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }
    .sessions-scroll::-webkit-scrollbar { width: 4px; }
    .sessions-scroll::-webkit-scrollbar-track { background: transparent; }
    .sessions-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .session-group-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 8px 8px 4px;
      font-weight: 600;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .12s;
      position: relative;
    }
    .session-item:hover { background: var(--surface); }
    .session-item.active { background: var(--surface-2); }

    .session-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      color: var(--text);
    }
    .session-item.active .session-title { color: var(--accent); }

    .session-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 15px;
      line-height: 1;
      transition: all .12s;
      flex-shrink: 0;
    }
    .session-item:hover .session-delete { opacity: 1; }
    .session-delete:hover { background: var(--danger); color: #fff; }

    .sessions-empty {
      padding: 16px 12px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    /* Sidebar footer */
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sys-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.ok  { background: var(--success); }
    .status-dot.err { background: var(--danger); }

    /* ── Main chat area ───────────────────────────────────────────────────── */
    .chat-area {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-header {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--bg);
    }

    .chat-header-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }

    .ticket-badge {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* Messages */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
    }
    .messages-wrap::-webkit-scrollbar { width: 5px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome screen */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      gap: 16px;
    }
    .welcome-screen.hidden { display: none; }

    .welcome-icon {
      font-size: 44px;
      line-height: 1;
    }

    .welcome-screen h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }

    .welcome-screen p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 420px;
    }

    .prompt-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 560px;
      margin-top: 8px;
    }

    .prompt-chip {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .prompt-chip:hover { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }

    /* Message list */
    #messagesList { display: flex; flex-direction: column; gap: 18px; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.user .msg-avatar { background: var(--accent); }
    .message.assistant .msg-avatar { background: var(--surface-2); border: 1px solid var(--border); }

    .msg-body { flex: 1; min-width: 0; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .message.user .msg-bubble {
      background: var(--user-bubble);
      color: #cdd9f4;
      border-bottom-right-radius: 3px;
    }
    .message.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    /* Markdown inside messages */
    .msg-bubble p { margin-bottom: .6em; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { margin: .5em 0 .5em 1.3em; }
    .msg-bubble li { margin-bottom: .2em; }
    .msg-bubble code {
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      color: #79c0ff;
    }
    .msg-bubble pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: .6em 0;
    }
    .msg-bubble pre code { background: none; padding: 0; color: var(--text); }
    .msg-bubble strong { color: #e6edf3; }

    /* Thinking indicator */
    .thinking-label {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }
    .thinking-dots span {
      animation: thinking-blink 1.2s infinite;
      opacity: 0;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes thinking-blink {
      0%, 80%, 100% { opacity: 0; }
      40%           { opacity: 1; }
    }

    /* Sources accordion */
    .sources-accordion {
      margin-top: 8px;
    }

    .sources-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      transition: all .12s;
      user-select: none;
    }
    .sources-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .sources-toggle .arrow { transition: transform .2s; display: inline-block; }
    .sources-toggle.open .arrow { transform: rotate(90deg); }

    .sources-list {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .sources-list.visible { display: flex; }

    .source-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12px;
    }

    .source-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .source-id {
      font-weight: 600;
      color: var(--accent);
      font-family: "SF Mono", Consolas, monospace;
    }

    .badge {
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-cat  { background: #1f4e3d; color: #3fb950; }
    .badge-mod  { background: #1e3a5f; color: #79c0ff; }
    .badge-high { background: #4d1e1e; color: #f85149; }
    .badge-med  { background: #4d3a1e; color: #e3b341; }
    .badge-low  { background: #1e2d1e; color: #7ee787; }

    .source-relevance {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    .source-excerpt {
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-bottom-left-radius: 3px;
      width: fit-content;
      margin-top: 4px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ───────────────────────────────────────────────────────── */
    .input-section {
      border-top: 1px solid var(--border);
      padding: 12px 20px 14px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-container {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      transition: border-color .15s;
    }
    .input-container:focus-within { border-color: var(--accent); }

    #msgInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      min-height: 22px;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }
    #msgInput::placeholder { color: var(--text-dim); }
    #msgInput::-webkit-scrollbar { width: 3px; }
    #msgInput::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .btn-send, .btn-stop {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .15s;
    }
    .btn-send {
      background: var(--accent);
      color: #fff;
    }
    .btn-send:hover:not(:disabled) { background: #1f6feb; }
    .btn-send:disabled { background: var(--text-dim); cursor: not-allowed; }
    .btn-stop {
      background: var(--surface-2);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-stop:hover { background: #2a1a1a; }

    .input-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      text-align: center;
    }

    .btn-secondary {
      padding: 7px 16px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      transition: background .12s;
    }
    .btn-secondary:hover { background: var(--surface); }

    .btn-primary {
      padding: 7px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s;
    }
    .btn-primary:hover:not(:disabled) { background: #1f6feb; }
    .btn-primary:disabled { background: var(--text-dim); cursor: not-allowed; }

    /* Feedback buttons */
    .msg-feedback {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .fb-label { font-size: 11px; color: var(--text-dim); }
    .fb-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all .12s;
      line-height: 1.4;
    }
    .fb-btn:hover:not(:disabled) { background: var(--surface-2); border-color: var(--accent); }
    .fb-btn:disabled { cursor: default; }
    .fb-btn.selected-pos { border-color: var(--success); color: var(--success); background: #1e2d1e; }
    .fb-btn.selected-neg { border-color: var(--danger);  color: var(--danger);  background: #2a1a1a; }
    .fb-thanks { font-size: 11px; color: var(--text-muted); }

    /* Fade-in animation for new messages */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message { animation: fadeUp .2s ease; }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">🤖</div>
        <span id="brandName">Support AI</span>
      </div>
      <button class="btn-new-chat" id="newChatBtn">+ New Conversation</button>
    </div>

    <div class="sessions-scroll" id="sessionsList">
      <div class="sessions-empty">No conversations yet</div>
    </div>

    <div class="sidebar-footer">
      <div class="sys-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting…</span>
      </div>
    </div>
  </aside>

  <!-- ── Chat area ─────────────────────────────────────────────────────────── -->
  <main class="chat-area">
    <div class="chat-header">
      <span class="chat-header-title" id="chatTitle">Support AI</span>
    </div>

    <div class="messages-wrap" id="messagesWrap">
      <!-- Welcome screen -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">🤖</div>
        <h1 id="welcomeTitle">Support Assistant</h1>
        <p id="welcomeSubtitle">Ask me anything. I'll search the knowledge base for relevant answers.</p>
        <div class="prompt-chips" id="promptChips"></div>
      </div>

      <!-- Messages -->
      <div id="messagesList"></div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator" style="display:none">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-section">
      <div class="input-container">
        <textarea id="msgInput" placeholder="Ask a question…" rows="1"></textarea>
        <button class="btn-stop" id="stopBtn" style="display:none">■ Stop</button>
        <button class="btn-send" id="sendBtn" disabled>Send ↵</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </main>
</div>

<script>
/* ── marked.js config ───────────────────────────────────────────────────────── */
marked.setOptions({ breaks: true, gfm: true });

/* ── State ──────────────────────────────────────────────────────────────────── */
let currentSessionId  = null;
let currentReqId      = null;
let isGenerating      = false;

/* ── API helpers ────────────────────────────────────────────────────────────── */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json" },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

/* ── Session management ─────────────────────────────────────────────────────── */
async function loadSessions() {
  const sessions = await api("GET", "/api/sessions");
  renderSessionList(sessions);
}

function renderSessionList(sessions) {
  const el = document.getElementById("sessionsList");
  if (!sessions.length) {
    el.innerHTML = '<div class="sessions-empty">No conversations yet</div>';
    return;
  }

  // Group by date
  const groups = {};
  const now = new Date();
  sessions.forEach(s => {
    const d = new Date(s.updated_at);
    const diffDays = Math.floor((now - d) / 86400000);
    const key = diffDays === 0 ? "Today"
              : diffDays === 1 ? "Yesterday"
              : diffDays < 7  ? "This Week"
              : diffDays < 30 ? "This Month"
              : "Older";
    (groups[key] = groups[key] || []).push(s);
  });

  const order = ["Today", "Yesterday", "This Week", "This Month", "Older"];
  let html = "";
  order.forEach(g => {
    if (!groups[g]) return;
    html += `<div class="session-group-label">${g}</div>`;
    groups[g].forEach(s => {
      html += `
        <div class="session-item${s.id === currentSessionId ? " active" : ""}"
             data-id="${s.id}" onclick="selectSession('${s.id}')">
          <span class="session-title">${escHtml(s.title)}</span>
          <button class="session-delete" title="Delete"
            onclick="event.stopPropagation(); deleteSession('${s.id}')">✕</button>
        </div>`;
    });
  });
  el.innerHTML = html;
}

async function createSession() {
  const session = await api("POST", "/api/sessions", { title: "New Conversation" });
  currentSessionId = session.id;
  await loadSessions();
  showWelcome(true);
  document.getElementById("chatTitle").textContent = "New Conversation";
  document.getElementById("messagesList").innerHTML = "";
}

async function selectSession(id) {
  if (isGenerating) return;
  currentSessionId = id;
  const session = await api("GET", `/api/sessions/${id}`);
  document.getElementById("chatTitle").textContent = session.title;
  renderMessages(session.messages || []);
  await loadSessions(); // refresh active state
}

async function deleteSession(id) {
  await api("DELETE", `/api/sessions/${id}`);
  if (currentSessionId === id) {
    currentSessionId = null;
    showWelcome(true);
    document.getElementById("chatTitle").textContent = window._productName || "Support AI";
    document.getElementById("messagesList").innerHTML = "";
  }
  await loadSessions();
}

/* ── Message rendering ──────────────────────────────────────────────────────── */
function renderMessages(messages) {
  const el = document.getElementById("messagesList");
  el.innerHTML = "";
  messages.forEach(m => appendMessage(m.role, m.content, m.sources || [], false, m.id || null));
  showWelcome(messages.length === 0);
  scrollToBottom();
}

function appendMessage(role, content, sources, animate = true, messageId = null) {
  showWelcome(false);
  const list = document.getElementById("messagesList");

  const div = document.createElement("div");
  div.className = `message ${role}`;
  if (messageId) div.dataset.messageId = messageId;
  if (!animate) div.style.animation = "none";

  const avatar = role === "user" ? "👤" : "🤖";
  const bubbleHtml = role === "assistant"
    ? marked.parse(content)
    : escHtml(content).replace(/\n/g, "<br>");

  const feedbackHtml = role === "assistant" ? renderFeedback(messageId) : "";

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">${bubbleHtml}</div>
      ${sources && sources.length ? renderSources(sources) : ""}
      ${feedbackHtml}
    </div>`;

  if (role === "assistant") attachFeedbackHandlers(div);
  list.appendChild(div);
  scrollToBottom();
  return div;
}

function renderFeedback(messageId) {
  const idAttr = messageId ? `data-message-id="${messageId}"` : "";
  return `
    <div class="msg-feedback" ${idAttr}>
      <span class="fb-label">Helpful?</span>
      <button class="fb-btn" data-rating="1"  title="Yes">👍</button>
      <button class="fb-btn" data-rating="-1" title="No">👎</button>
      <span class="fb-thanks" style="display:none">Thanks!</span>
    </div>`;
}

function attachFeedbackHandlers(msgDiv) {
  msgDiv.querySelectorAll(".fb-btn").forEach(btn => {
    btn.addEventListener("click", () => submitFeedback(msgDiv, parseInt(btn.dataset.rating)));
  });
}

async function submitFeedback(msgDiv, rating) {
  const fb        = msgDiv.querySelector(".msg-feedback");
  const messageId = fb ? fb.dataset.messageId : null;
  if (!messageId || !currentSessionId) return;
  try {
    await api("POST", "/api/feedback", {
      message_id: messageId,
      session_id: currentSessionId,
      rating,
    });
    fb.querySelectorAll(".fb-btn").forEach(b => {
      b.disabled = true;
      if (parseInt(b.dataset.rating) === rating) {
        b.classList.add(rating === 1 ? "selected-pos" : "selected-neg");
      }
    });
    fb.querySelector(".fb-label").style.display  = "none";
    fb.querySelector(".fb-thanks").style.display = "";
  } catch (err) {
    console.error("Feedback error:", err);
  }
}

function renderSources(sources) {
  // Sources are used internally by the LLM but not shown to end users
  return "";
  const cards = sources.map(s => {
    const pClass = s.priority === "Critical" || s.priority === "High" ? "badge-high"
                 : s.priority === "Medium" ? "badge-med" : "badge-low";
    const rel = s.relevance ? `${Math.round(s.relevance * 100)}% match` : "";
    return `
      <div class="source-card">
        <div class="source-header">
          <span class="source-id">${escHtml(s.ticket_id)}</span>
          ${s.category ? `<span class="badge badge-cat">${escHtml(s.category)}</span>` : ""}
          ${s.module   ? `<span class="badge badge-mod">${escHtml(s.module)}</span>`   : ""}
          ${s.priority ? `<span class="badge ${pClass}">${escHtml(s.priority)}</span>` : ""}
          <span class="source-relevance">${rel}</span>
        </div>
        ${s.title ? `<strong style="font-size:12px;color:var(--text)">${escHtml(s.title)}</strong>` : ""}
        <p class="source-excerpt">${escHtml(s.excerpt)}</p>
      </div>`;
  }).join("");

  return `
    <div class="sources-accordion">
      <button class="sources-toggle" onclick="toggleSources(this)">
        <span class="arrow">▶</span> Sources (${sources.length})
      </button>
      <div class="sources-list">${cards}</div>
    </div>`;
}

function toggleSources(btn) {
  btn.classList.toggle("open");
  const list = btn.nextElementSibling;
  list.classList.toggle("visible");
}

/* Streaming: create an assistant bubble with a thinking placeholder */
function createStreamingBubble() {
  showWelcome(false);
  const list = document.getElementById("messagesList");
  const div = document.createElement("div");
  div.className = "message assistant";
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-bubble" id="streamBubble">
        <span class="thinking-label">Analyzing<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span></span>
      </div>
    </div>`;
  list.appendChild(div);
  scrollToBottom();
  return div;
}

let _streamBubbleRaw = "";
function appendToken(token) {
  // Clear the thinking placeholder on the first token
  if (_streamBubbleRaw === "") {
    const el = document.getElementById("streamBubble");
    if (el) el.innerHTML = "";
  }
  _streamBubbleRaw += token;
  const el = document.getElementById("streamBubble");
  if (el) {
    el.innerHTML = marked.parse(_streamBubbleRaw);
    scrollToBottom();
  }
}

function finalizeStreamingBubble(sources, messageId) {
  const el = document.getElementById("streamBubble");
  if (!el) return;
  el.id = "";
  if (sources && sources.length) {
    el.parentElement.insertAdjacentHTML("beforeend", renderSources(sources));
  }
  el.parentElement.insertAdjacentHTML("beforeend", renderFeedback(messageId));
  const msgDiv = el.closest(".message");
  if (msgDiv) {
    if (messageId) msgDiv.dataset.messageId = messageId;
    attachFeedbackHandlers(msgDiv);
  }
  _streamBubbleRaw = "";
}

/* ── Send message ───────────────────────────────────────────────────────────── */
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || isGenerating) return;

  // Ensure we have a session
  if (!currentSessionId) {
    const session = await api("POST", "/api/sessions", { title: "New Conversation" });
    currentSessionId = session.id;
    await loadSessions();
  }

  input.value = "";
  autoResize(input);

  setGenerating(true);
  appendMessage("user", text, [], true);
  document.getElementById("typingIndicator").style.display = "flex";
  scrollToBottom();

  let streamDiv = null;
  let collectedSources = [];

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: currentSessionId, message: text }),
    });

    if (!res.ok) {
      throw new Error(`Server error ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete last line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { continue; }

        if (data.type === "req_id") {
          currentReqId = data.req_id;

        } else if (data.type === "sources") {
          collectedSources = data.sources || [];
          document.getElementById("typingIndicator").style.display = "none";
          streamDiv = createStreamingBubble();

        } else if (data.type === "token") {
          appendToken(data.content);

        } else if (data.type === "done") {
          finalizeStreamingBubble(collectedSources, data.message_id || null);
          await loadSessions();

        } else if (data.type === "error") {
          document.getElementById("typingIndicator").style.display = "none";
          appendMessage("assistant", `*Error: ${data.message}*`, [], true);
        }
      }
    }
  } catch (err) {
    document.getElementById("typingIndicator").style.display = "none";
    appendMessage("assistant", `*Connection error: ${err.message}*`, [], true);
  } finally {
    setGenerating(false);
    currentReqId = null;
    document.getElementById("typingIndicator").style.display = "none";
  }
}

async function stopGeneration() {
  if (!currentReqId) return;
  await fetch("/api/stop", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ req_id: currentReqId }),
  });
}

/* ── UI helpers ─────────────────────────────────────────────────────────────── */
function setGenerating(state) {
  isGenerating = state;
  document.getElementById("sendBtn").style.display = state ? "none" : "";
  document.getElementById("stopBtn").style.display = state ? "" : "none";
  document.getElementById("msgInput").disabled = state;
  if (!state) document.getElementById("msgInput").focus();
}

function showWelcome(show) {
  const welcome = document.getElementById("welcomeScreen");
  const list    = document.getElementById("messagesList");
  welcome.classList.toggle("hidden", !show);
  list.style.display = show ? "none" : "";
}

function scrollToBottom() {
  const wrap = document.getElementById("messagesWrap");
  wrap.scrollTop = wrap.scrollHeight;
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 160) + "px";
}

function escHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/* ── System status ──────────────────────────────────────────────────────────── */
async function refreshStatus() {
  try {
    await api("GET", "/api/status");
    document.getElementById("statusDot").className  = "status-dot ok";
    document.getElementById("statusText").textContent = "Online";
  } catch {
    document.getElementById("statusDot").className  = "status-dot err";
    document.getElementById("statusText").textContent = "Offline";
  }
}

/* ── Event listeners ────────────────────────────────────────────────────────── */
document.getElementById("newChatBtn").addEventListener("click", createSession);
document.getElementById("stopBtn").addEventListener("click", stopGeneration);
document.getElementById("sendBtn").addEventListener("click", sendMessage);

const input = document.getElementById("msgInput");
input.addEventListener("input", () => {
  autoResize(input);
  document.getElementById("sendBtn").disabled = !input.value.trim();
});
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* ── Product config ─────────────────────────────────────────────────────────── */
function applyProductConfig(prod) {
  const ui = prod.ui || {};
  const name = prod.name || "Support AI";
  window._productName = name;

  document.title = name;
  document.getElementById("brandName").textContent      = ui.brand            || name;
  document.getElementById("chatTitle").textContent      = name;
  document.getElementById("welcomeTitle").textContent   = ui.welcome_title    || name;
  document.getElementById("welcomeSubtitle").textContent = ui.welcome_subtitle || "";

  const msgInput = document.getElementById("msgInput");
  msgInput.placeholder = ui.input_placeholder || "Ask a question…";

  // Render prompt chips dynamically
  const container = document.getElementById("promptChips");
  const prompts   = ui.suggested_prompts || [];
  container.innerHTML = prompts.map(p =>
    `<button class="prompt-chip" data-prompt="${escHtml(p.prompt)}">${escHtml(p.label)}</button>`
  ).join("");
  container.querySelectorAll(".prompt-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      msgInput.value = btn.dataset.prompt;
      autoResize(msgInput);
      document.getElementById("sendBtn").disabled = false;
      msgInput.focus();
      sendMessage();
    });
  });
}

/* ── Init ───────────────────────────────────────────────────────────────────── */
async function init() {
  showWelcome(true);
  try {
    const prod = await api("GET", "/api/product");
    applyProductConfig(prod);
  } catch {
    // server not yet ready — leave defaults in place
  }
  await loadSessions();
  await refreshStatus();
  setInterval(refreshStatus, 30000);
}

init();
</script>
